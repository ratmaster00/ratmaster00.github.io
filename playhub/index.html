<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HubPlayer</title>

<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background-color: #000;
    color: #fff;
}

/* Header */
.header {
    background: #111;
    padding: 12px 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid #ff9000;
}

.logo {
    font-size: 28px;
    font-weight: bold;
}

.logo span {
    background: #ff9000;
    color: black;
    padding: 4px 8px;
    border-radius: 4px;
    margin-left: 6px;
}

.search-bar input {
    width: 400px;
    padding: 8px;
    background: #222;
    border: none;
    border-radius: 3px;
    color: white;
}

/* Layout */
.main {
    display: flex;
    max-width: 1500px;
    margin: 30px auto;
    padding: 0 20px;
}

.left {
    flex: 3;
    margin-right: 30px;
}

.right {
    flex: 1;
}

/* Video */
.video-box {
    background: #111;
    padding: 10px;
    border-radius: 6px;
}

video {
    width: 100%;
    border-radius: 6px;
}

.title {
    font-size: 22px;
    margin-top: 15px;
    font-weight: bold;
}

.meta {
    color: #aaa;
    font-size: 14px;
    margin-top: 5px;
}

.actions {
    margin-top: 15px;
}

.btn {
    background: #222;
    border: 1px solid #ff9000;
    color: #ff9000;
    padding: 8px 14px;
    margin-right: 10px;
    border-radius: 4px;
    cursor: pointer;
}

.btn:hover {
    background: #ff9000;
    color: black;
}

/* Tags */
.tags {
    margin-top: 20px;
}

.tag {
    display: inline-block;
    background: #222;
    padding: 6px 10px;
    margin: 4px 4px 0 0;
    border-radius: 3px;
    font-size: 13px;
    color: #ff9000;
}

/* Sidebar */
.sidebar-title {
    font-weight: bold;
    margin-bottom: 10px;
}

.thumb {
    display: flex;
    margin-bottom: 15px;
    cursor: pointer;
}

.thumb img {
    width: 120px;
    height: 70px;
    object-fit: cover;
    border-radius: 4px;
    margin-right: 10px;
}

.thumb-info {
    font-size: 13px;
    color: #ff9000;
}

.thumb-info span {
    font-size: 13px;
    color: #ccc;
}
  
/* File Select */
.file-select {
    margin-bottom: 20px;
}

.file-select input {
    display: none;
}

.file-label {
    background: #ff9000;
    color: black;
    padding: 8px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
}

.file-label:hover {
    opacity: 0.8;
}

footer {
    text-align: center;
    color: #666;
    padding: 30px;
    border-top: 1px solid #111;
    margin-top: 50px;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">Play<span>Hub</span></div>
    <div class="search-bar">
        <input type="text" placeholder="Search (not functional)">
    </div>
</div>

<div class="main">

    <div class="left">

        <div class="file-select">
            <label class="file-label">
                Upload Video
                <input type="file" id="videoInput" accept="video/mp4">
            </label>
        </div>

        <div class="video-box">
            <video id="videoPlayer" controls></video>
        </div>

        <div class="title" id="videoTitle">No video selected</div>
        <div class="meta">0 views • Just now • Local playback</div>

        <div class="actions">
            <button class="btn">👍 Like</button>
            <button class="btn">⭐ Favorite</button>
            <button class="btn">🔗 Share</button>
        </div>

        <div class="tags">
            <span class="tag">local</span>
            <span class="tag">mp4</span>
            <span class="tag">custom</span>
            <span class="tag">offline</span>
        </div>

    </div>

    <div class="right">
        <div class="sidebar-title">Recommended</div>
